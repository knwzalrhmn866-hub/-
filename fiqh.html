<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كنوز الرحمن - الفقه الميسر</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
                   RESET & ROOT VARIABLES
                   ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0d0d2b;
            --primary-mid: #1a1a4e;
            --primary-light: #2d2d7a;
            --gold-main: #ffd700;
            --gold-light: #ffed4a;
            --gold-glow: rgba(255, 215, 0, 0.25);
            --text-light: #f0f0ff;
            --text-muted: #c4c4e0;
            --text-dim: #8888aa;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow-heavy: 0 25px 60px -12px rgba(0, 0, 0, 0.8);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius-lg: 48px;
            --radius-md: 28px;
            --radius-sm: 18px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-arabic: 'Amiri', 'Tajawal', serif;
            --font-ui: 'Tajawal', 'Segoe UI', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-ui);
            background: linear-gradient(135deg, #0d0d2b 0%, #1a1a4e 50%, #2d2d7a 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-light);
            padding: clamp(12px, 3vw, 40px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding-top: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 40%, rgba(255, 215, 0, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 20% 80%, rgba(255, 215, 0, 0.02) 0%, transparent 50%);
            animation: ambientGlow 20s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes ambientGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(2%, -2%) scale(1.1);
            }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 130px 80px, #fff, transparent),
                radial-gradient(2px 2px at 160px 30px, rgba(255, 255, 255, 0.7), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
            }
            100% {
                opacity: 0.5;
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(13, 13, 43, 0.85);
            backdrop-filter: blur(20px) saturate(1.4);
            -webkit-backdrop-filter: blur(20px) saturate(1.4);
            border-radius: var(--radius-lg);
            padding: clamp(20px, 4vw, 45px);
            box-shadow: var(--shadow-heavy), inset 0 1px 0 rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.08);
            transition: var(--transition);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: clamp(12px, 2vw, 25px);
            margin-bottom: clamp(25px, 4vw, 45px);
            padding-bottom: clamp(15px, 2vw, 25px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.1);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: 0;
            width: clamp(60px, 15vw, 160px);
            height: 2px;
            background: linear-gradient(90deg, var(--gold-main), var(--gold-light));
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .logo {
            display: flex;
            flex-direction: column;
        }

        .logo h1 {
            font-family: var(--font-arabic);
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold-main), var(--gold-light), #ffb700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 1px;
            line-height: 1.2;
            cursor: pointer;
            transition: var(--transition);
        }

        .logo h1:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .logo .subtitle {
            font-size: clamp(0.75rem, 1.2vw, 1rem);
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
            background: none;
            letter-spacing: 2px;
            font-weight: 400;
            margin-top: 2px;
        }

        .logo .subtitle span {
            color: var(--gold-main);
            -webkit-text-fill-color: var(--gold-main);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: clamp(10px, 2vw, 25px);
            flex-wrap: wrap;
        }

        .date-box {
            background: rgba(0, 0, 0, 0.4);
            padding: clamp(6px, 0.8vw, 12px) clamp(14px, 2vw, 28px);
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            color: var(--text-muted);
            white-space: nowrap;
            backdrop-filter: blur(4px);
            font-weight: 500;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        .date-box .hijri-date {
            color: var(--gold-light);
            font-weight: 700;
            font-size: clamp(0.8rem, 1.1vw, 1.1rem);
        }

        .date-box .gregorian-date {
            font-size: clamp(0.7rem, 0.9vw, 0.9rem);
            opacity: 0.8;
        }

        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(6px, 1vw, 14px);
            margin-bottom: clamp(25px, 4vw, 40px);
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            padding: clamp(6px, 0.8vw, 12px);
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: clamp(8px, 1vw, 14px) clamp(16px, 2.5vw, 38px);
            border-radius: 60px;
            font-size: clamp(0.85rem, 1.1vw, 1.15rem);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-ui);
            letter-spacing: 0.3px;
            position: relative;
            white-space: nowrap;
            flex: 0 1 auto;
            text-decoration: none;
        }

        .nav-btn:hover {
            color: var(--text-light);
            background: rgba(255, 215, 0, 0.06);
            transform: translateY(-1px);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, var(--gold-main), var(--gold-light));
            color: #0d0d2b;
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
            font-weight: 700;
        }

        .nav-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.35);
        }

        .nav-btn .icon {
            margin-left: 6px;
        }

        .content {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius-md);
            padding: clamp(16px, 2.5vw, 35px);
            min-height: 400px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            transition: var(--transition);
            position: relative;
        }

        .section {
            display: none;
            animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section.active {
            display: block;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .section-header {
            margin-bottom: clamp(20px, 3vw, 35px);
        }

        .section-title {
            font-family: var(--font-arabic);
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            font-weight: 700;
            color: var(--gold-main);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .section-title .badge {
            font-size: 0.6em;
            background: rgba(255, 215, 0, 0.15);
            padding: 2px 14px;
            border-radius: 40px;
            color: var(--gold-light);
            font-family: var(--font-ui);
        }

        .section-sub {
            color: var(--text-muted);
            font-size: clamp(0.85rem, 1.1vw, 1.05rem);
            margin-top: 4px;
            padding-right: 20px;
            border-right: 3px solid var(--gold-main);
            opacity: 0.85;
        }

        /* ============================================================
                   بطاقات الفقه
                   ============================================================ */
        .fiqh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
            gap: clamp(20px, 2.5vw, 30px);
        }

        .fiqh-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: clamp(25px, 3vw, 35px);
            border: 1px solid var(--card-border);
            transition: var(--transition);
            backdrop-filter: blur(4px);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 200px;
            justify-content: center;
        }

        .fiqh-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.06), rgba(255, 237, 74, 0.02));
            opacity: 0;
            transition: var(--transition);
        }

        .fiqh-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.05);
        }

        .fiqh-card:hover::before {
            opacity: 1;
        }

        .fiqh-card:active {
            transform: scale(0.95);
        }

        .fiqh-card .card-icon {
            font-size: clamp(3rem, 5vw, 4.5rem);
            display: block;
            margin-bottom: 12px;
        }

        .fiqh-card .card-title {
            font-family: var(--font-arabic);
            font-size: clamp(1.4rem, 2vw, 2rem);
            color: var(--gold-main);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .fiqh-card .card-sub {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .fiqh-card .card-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
            opacity: 0.5;
            transition: var(--transition);
        }

        .fiqh-card:hover .card-hint {
            opacity: 1;
            color: var(--gold-main);
        }

        /* ============================================================
                   عرض المحتوى (المودال)
                   ============================================================ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: clamp(15px, 3vw, 40px);
            animation: modalFadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-content {
            background: linear-gradient(145deg, #0d0d2b, #1a1a4e);
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: var(--radius-md);
            padding: clamp(25px, 4vw, 50px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.03);
            position: relative;
            animation: modalContentIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalContentIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: left;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-ui);
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .modal-close:hover {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold-main);
            color: var(--gold-main);
            transform: rotate(90deg);
        }

        .modal-header {
            text-align: center;
            border-bottom: 1px solid rgba(255, 215, 0, 0.1);
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        .modal-header .modal-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 6px;
        }

        .modal-header .modal-title {
            font-family: var(--font-arabic);
            font-size: clamp(1.8rem, 2.8vw, 2.6rem);
            color: var(--gold-main);
            font-weight: 700;
        }

        .modal-header .modal-sub {
            color: var(--text-muted);
            font-size: clamp(0.85rem, 1vw, 1rem);
            margin-top: 4px;
        }

        .modal-body {
            padding: 4px 0;
        }

        .modal-body .section-block {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            border-right: 3px solid var(--gold-main);
        }

        .modal-body .section-block .block-title {
            font-family: var(--font-arabic);
            font-size: clamp(1.1rem, 1.4vw, 1.3rem);
            color: var(--gold-light);
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-body .section-block .block-title .icon-sm {
            font-size: 1.2rem;
        }

        .modal-body .section-block ul {
            list-style: none;
            padding: 0;
        }

        .modal-body .section-block ul li {
            padding: 6px 0 6px 28px;
            position: relative;
            color: var(--text-muted);
            font-size: clamp(0.95rem, 1.1vw, 1.05rem);
            line-height: 1.8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .modal-body .section-block ul li:last-child {
            border-bottom: none;
        }

        .modal-body .section-block ul li::before {
            content: '◈';
            position: absolute;
            right: 0;
            color: var(--gold-main);
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .modal-body .section-block ul li strong {
            color: var(--text-light);
            font-weight: 600;
        }

        .modal-body .section-block .highlight {
            color: var(--gold-light);
        }

        .modal-footer-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
            justify-content: center;
            border-top: 1px solid rgba(255, 215, 0, 0.05);
            padding-top: 20px;
        }

        .modal-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-muted);
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-ui);
            font-size: 0.9rem;
        }

        .modal-btn:hover {
            background: rgba(255, 215, 0, 0.08);
            border-color: var(--gold-main);
            color: var(--gold-main);
        }

        .modal-content::-webkit-scrollbar {
            width: 4px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: var(--gold-main);
            border-radius: 10px;
        }

        /* ============================================================
                   الفوتر
                   ============================================================ */
        .app-footer {
            margin-top: clamp(30px, 4vw, 50px);
            text-align: center;
            color: var(--text-dim);
            font-size: clamp(0.75rem, 0.8vw, 0.9rem);
            border-top: 1px solid rgba(255, 215, 0, 0.06);
            padding-top: clamp(25px, 3vw, 35px);
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        .footer-developer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .footer-developer .dev-name {
            font-size: clamp(0.9rem, 1.1vw, 1.1rem);
            color: var(--gold-main);
            font-weight: 700;
            font-family: var(--font-arabic);
        }

        .footer-developer .dev-phone {
            font-size: clamp(0.8rem, 1vw, 0.95rem);
            color: var(--text-muted);
            direction: ltr;
        }

        .footer-developer .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #25D366;
            color: #fff;
            padding: 8px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: clamp(0.8rem, 0.9vw, 0.95rem);
            transition: var(--transition);
            font-family: var(--font-ui);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
        }

        .footer-developer .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.35);
        }

        .footer-heart {
            color: var(--gold-light);
        }

        /* ============================================================
                   تحسينات للشاشات الصغيرة
                   ============================================================ */
        @media (max-width: 480px) {
            body {
                padding: 8px;
                padding-top: 10px;
            }
            .app-container {
                padding: 14px;
                border-radius: 28px;
            }
            .nav-tabs {
                border-radius: 40px;
                padding: 6px;
                gap: 4px;
                flex-wrap: nowrap;
                overflow-x: auto;
                justify-content: flex-start;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            .nav-tabs::-webkit-scrollbar {
                display: none;
            }
            .nav-btn {
                font-size: 0.75rem;
                padding: 8px 14px;
                flex: 0 0 auto;
                white-space: nowrap;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .header-left {
                justify-content: space-between;
            }
            .date-box {
                font-size: 0.7rem;
                padding: 4px 14px;
                white-space: normal;
            }
            .content {
                padding: 12px;
                border-radius: 18px;
            }
            .fiqh-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .fiqh-card {
                min-height: 150px;
                padding: 18px;
            }
            .modal-content {
                padding: 20px;
                max-height: 95vh;
            }
            .modal-close {
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
            .footer-developer .whatsapp-btn {
                padding: 6px 18px;
                font-size: 0.8rem;
            }
            .modal-body .section-block {
                padding: 12px 14px;
            }
            .modal-body .section-block ul li {
                padding: 4px 0 4px 24px;
                font-size: 0.9rem;
            }
        }

        @media (min-width: 481px) and (max-width: 820px) {
            .fiqh-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (min-width: 1400px) {
            .app-container {
                max-width: 1320px;
                padding: 55px;
            }
            .fiqh-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--gold-main);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gold-light);
        }

        ::selection {
            background: var(--gold-main);
            color: #0d0d2b;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- ===== الهيدر ===== -->
        <header class="header">
            <div class="logo">
                <h1 onclick="location.reload()">🕌 كنوز الرحمن</h1>
                <div class="subtitle"><span>الفقه الميسر</span></div>
            </div>
            <div class="header-left">

    <!-- ===== مودال عرض المحتوى ===== -->
    <div class="modal-overlay" id="fiqhModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  بيانات الفقه الميسر
        // ============================================================

        const fiqhData = [{
            id: 'tahara',
            icon: '💧',
            title: 'الطهارة',
            sub: 'أحكام المياه والوضوء والغسل',
            content: `
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">💧</span> أنواع المياه وأحكامها</div>
                            <ul>
                                <li><strong>ماء طهور:</strong> باقٍ على أصل خلقته (كمطير وبحر)، يصح للوضوء والغسل.</li>
                                <li><strong>ماء نجس:</strong> تغير طعمه أو لونه أو ريحه بنجاسة، لا يجوز استعماله.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">🚫</span> نواقض الوضوء (مبطلاته)</div>
                            <ul>
                                <li>الخارج من السبيلين (بول، غائط، ريح).</li>
                                <li>النوم العميق الذي يزول معه الإدراك.</li>
                                <li>زوال العقل بسكر أو إغماء.</li>
                                <li>مس الفرج مباشرة باليد بشهوة.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">🛁</span> موجبات الغسل (الحدث الأكبر)</div>
                            <ul>
                                <li>الجماع (التقاء الختانين).</li>
                                <li>خروج المني بشهوة في اليقظة أو المنام.</li>
                                <li>انقطاع دم الحيض أو النفاس للمرأة.</li>
                                <li>الموت (تجهيز الميت للدفن).</li>
                            </ul>
                        </div>
                    `
        }, {
            id: 'salah',
            icon: '🕌',
            title: 'الصلاة',
            sub: 'شروط الصلاة وأركانها ومبطلاتها',
            content: `
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">✅</span> شروط صحة الصلاة (قبل البدء فيها)</div>
                            <ul>
                                <li>دخول وقت الصلاة.</li>
                                <li>الطهارة من الحدثين (الأصغر والأكبر).</li>
                                <li>طهارة الثوب، البدن، والمكان من النجاسة.</li>
                                <li>ستر العورة.</li>
                                <li>استقبال القبلة.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">📿</span> أركان الصلاة (لا تسقط عمداً ولا سهواً)</div>
                            <ul>
                                <li>القيام في الفرض مع القدرة.</li>
                                <li>تكبيرة الإحرام.</li>
                                <li>قراءة سورة الفاتحة في كل ركعة.</li>
                                <li>الركوع والرفع منه.</li>
                                <li>السجود على الأعضاء السبعة والرفع منه.</li>
                                <li>الطمأنينة في جميع الأفعال.</li>
                                <li>التشهد الأخير والجلوس له.</li>
                                <li>التسليم.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">🚫</span> مبطلات الصلاة</div>
                            <ul>
                                <li>الكلام العمد لغير مصلحة الصلاة.</li>
                                <li>الضحك بصوت (القهقهة).</li>
                                <li>الأكل والشرب عمداً.</li>
                                <li>الحركة الكثيرة المتوالية لغير ضرورة.</li>
                                <li>انتقاض الطهارة (خروج ريح مثلاً).</li>
                            </ul>
                        </div>
                    `
        }, {
            id: 'sawm',
            icon: '🌙',
            title: 'الصيام',
            sub: 'أركان الصيام ومفسداته وأعذاره',
            content: `
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">📝</span> أركان الصيام</div>
                            <ul>
                                <li><strong>النية:</strong> تبييت النية من الليل للفرض.</li>
                                <li><strong>الإمساك:</strong> التوقف عن المفطرات من طلوع الفجر الصادق إلى غروب الشمس.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">🚫</span> مفسدات الصيام (المفطرات)</div>
                            <ul>
                                <li>الأكل والشرب عمداً.</li>
                                <li>القيء عمداً (الاستقاءة).</li>
                                <li>الجماع في نهار رمضان.</li>
                                <li>خروج دم الحيض أو النفاس.</li>
                                <li>الإبر المغذية التي تقوم مقام الطعام.</li>
                            </ul>
                        </div>
                        <div class="section-block">
                            <div class="block-title"><span class="icon-sm">🩺</span> الأعذار المبيحة للفطر</div>
                            <ul>
                                <li>المرض الذي يشق معه الصوم.</li>
                                <li>السفر الطويل المبيح للقصر.</li>
                                <li>الحيض والنفاس (يجب الفطر ويحرم الصوم).</li>
                                <li>الحمل والرضاع إذا خافت المرأة على نفسها أو ولدها.</li>
                                <li>الكبر والعجز المستمر (تجب الفدية بدلاً من القضاء).</li>
                            </ul>
                        </div>
                    `
        }];

        // ============================================================
        //  دوال العرض
        // ============================================================

        function renderFiqh() {
            const container = document.getElementById('fiqhContainer');
            container.innerHTML = fiqhData.map(f => `
                        <div class="fiqh-card" data-id="${f.id}">
                            <span class="card-icon">${f.icon}</span>
                            <div class="card-title">${f.title}</div>
                            <div class="card-sub">${f.sub}</div>
                            <div class="card-hint">👆 اضغط للعرض</div>
                        </div>
                    `).join('');

            document.querySelectorAll('.fiqh-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const fiqh = fiqhData.find(f => f.id === id);
                    if (fiqh) {
                        openFiqhModal(fiqh);
                    }
                });
            });
        }

        // ============================================================
        //  المودال
        // ============================================================

        const modal = document.getElementById('fiqhModal');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        function openFiqhModal(fiqh) {
            modalBody.innerHTML = `
                        <div class="modal-header">
                            <span class="modal-icon">${fiqh.icon}</span>
                            <div class="modal-title">${fiqh.title}</div>
                            <div class="modal-sub">${fiqh.sub}</div>
                        </div>
                        <div class="modal-body">
                            ${fiqh.content}
                        </div>
                        <div class="modal-footer-actions">
                            <button class="modal-btn" onclick="closeModal()">✕ إغلاق</button>
                            <button class="modal-btn" onclick="window.print()">🖨️ طباعة</button>
                        </div>
                    `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        modal.addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal();
            }
        });

        modalClose.addEventListener('click', closeModal);

        // ============================================================
        //  التاريخ (ميلادي + هجري)
        // ============================================================

        function getHijriDate() {
            const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            const date = new Date();
            return formatter.format(date);
        }

        function updateDate() {
            const now = new Date();
            const options = {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            };
            const gregorianStr = now.toLocaleDateString('ar-EG', options);
            const hijriStr = getHijriDate();

            document.getElementById('hijriDate').textContent = `🕌 ${hijriStr}`;
            document.getElementById('gregorianDate').textContent = `📅 ${gregorianStr}`;
        }

        // ============================================================
        //  تشغيل التطبيق
        // ============================================================

        renderFiqh();
        updateDate();
        setInterval(updateDate, 60000);

        console.log('🌟 كنوز الرحمن - الفقه الميسر 🌟');
        console.log('📌 تم تحميل 3 أقسام: الطهارة، الصلاة، الصيام');
    </script>
